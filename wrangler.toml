name = "memory"
main = "src/index.ts"
compatibility_date = "2026-03-21"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[kv_namespaces]]
binding = "OAUTH_KV"
id = "PLACEHOLDER"

[durable_objects]
bindings = [
  { name = "MCP_OBJECT", class_name = "MemoryMCP" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["MemoryMCP"]
